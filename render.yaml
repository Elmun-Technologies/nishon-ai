services:
  - type: web
    name: nishon-ai-api
    env: node
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter api build
    startCommand: pnpm start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
