services:
  - type: web
    name: adspectr-api
    env: node
    plan: free
    rootDir: .
    buildCommand: >
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm --filter @adspectr/shared build &&
      pnpm --filter @adspectr/ai-sdk build &&
      NODE_OPTIONS='--max-old-space-size=400' pnpm --filter api build
    # Run pending DB migrations on every deploy, then start the API.
    startCommand: pnpm --filter api run start:prod:with-migrations
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Public URLs ────────────────────────────────────────────────────────
      # Custom domain example; override if you only use *.onrender.com
      - key: API_BASE_URL
        value: https://api.adspectr.com
      - key: FRONTEND_URL
        value: https://adspectr.com               # ← set to your production web URL

      # ── Database ───────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard

      # ── Redis ──────────────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ENCRYPTION_KEY
        sync: false

      # ── OpenAI ─────────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false

      # ── Google OAuth (Sign-In) ─────────────────────────────────────────────
      # callbackURL is auto-built from API_BASE_URL; no need to set separately
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false

      # ── Meta ───────────────────────────────────────────────────────────────
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_CALLBACK_URL
        value: https://api.adspectr.com/platforms/meta/callback

      # ── TikTok ─────────────────────────────────────────────────────────────
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false

      # ── Yandex ─────────────────────────────────────────────────────────────
      - key: YANDEX_CLIENT_ID
        sync: false
      - key: YANDEX_CLIENT_SECRET
        sync: false

      # ── Telegram (optional) ────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false
