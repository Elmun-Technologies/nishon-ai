services:
  - type: web
    name: adspectr-api
    env: node
    plan: free
    rootDir: .
    buildCommand: >
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm --filter @adspectr/shared build &&
      pnpm --filter @adspectr/ai-sdk build &&
      NODE_OPTIONS='--max-old-space-size=400' pnpm --filter api build
    # Run pending DB migrations on every deploy, then start the API.
    startCommand: pnpm --filter api run start:prod:with-migrations
    # /ready returns 503 when Postgres or Redis is unreachable, so Render
    # stops routing to (and redeploys) a broken instance. /health always
    # returns 200 and would mask a DB-down box as healthy.
    healthCheckPath: /ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # ── Public URLs ────────────────────────────────────────────────────────
      # Custom domain example; override if you only use *.onrender.com
      - key: API_BASE_URL
        value: https://api.adspectr.com
      - key: FRONTEND_URL
        value: https://adspectr.com               # ← set to your production web URL

      # ── Database ───────────────────────────────────────────────────────────
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard

      # ── Redis ──────────────────────────────────────────────────────────────
      - key: REDIS_URL
        sync: false

      # ── Auth ───────────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: ENCRYPTION_KEY
        sync: false

      # ── AI Provider ────────────────────────────────────────────────────────
      - key: AI_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

      # ── Google OAuth (Sign-In) ─────────────────────────────────────────────
      # callbackURL is auto-built from API_BASE_URL; no need to set separately
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_DEVELOPER_TOKEN
        sync: false

      # ── Meta ───────────────────────────────────────────────────────────────
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      # Must resolve to MetaAuthController's handler — the flow the frontend
      # /meta/connect drives (sets the httpOnly cookie and redirects back with
      # ?connected=1). Register this exact URL in the Meta App Dashboard.
      - key: META_CALLBACK_URL
        value: https://api.adspectr.com/meta/callback

      # ── TikTok ─────────────────────────────────────────────────────────────
      - key: TIKTOK_APP_ID
        sync: false
      - key: TIKTOK_APP_SECRET
        sync: false

      # ── Yandex ─────────────────────────────────────────────────────────────
      - key: YANDEX_CLIENT_ID
        sync: false
      - key: YANDEX_CLIENT_SECRET
        sync: false

      # ── Telegram (optional) ────────────────────────────────────────────────
      - key: TELEGRAM_BOT_TOKEN
        sync: false

      # ── Image generation — Reve via fal.ai (optional) ──────────────────────
      # fal.ai key with Reve access. Enables real static image-ad generation
      # in Creative Hub → Image ads. Without it the feature reports
      # "not configured" instead of generating.
      - key: FAL_KEY
        sync: false

      # ── Telegram channel discovery — TGStat (optional) ─────────────────────
      # TGStat API key. Enables the Telegram channel ad agent (discover + rank
      # channels for hyper-local placement). Without it the feature reports
      # "not configured" instead of returning channels.
      - key: TGSTAT_API_KEY
        sync: false
