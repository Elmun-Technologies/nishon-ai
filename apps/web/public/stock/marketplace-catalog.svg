<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Catalog of specialist profile cards with ratings and badges">
  <defs>
    <linearGradient id="mc-bg" x1="0" y1="0" x2="1280" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FCF2"/>
      <stop offset="1" stop-color="#E8F5DB"/>
    </linearGradient>
    <linearGradient id="mc-av" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#B0ED6F"/>
      <stop offset="1" stop-color="#93C75B"/>
    </linearGradient>
    <linearGradient id="mc-spark" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#93C75B"/>
      <stop offset="1" stop-color="#B0ED6F"/>
    </linearGradient>
    <radialGradient id="mc-glow" cx="0.5" cy="0.3" r="0.6">
      <stop stop-color="#B0ED6F" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#B0ED6F" stop-opacity="0"/>
    </radialGradient>
    <filter id="mc-shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#3D5626" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="url(#mc-bg)"/>
  <circle cx="640" cy="200" r="420" fill="url(#mc-glow)"/>

