version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nishon-ai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nishon_ai_db
      POSTGRES_USER: nishon
      POSTGRES_PASSWORD: nishon_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nishon -d nishon_ai_db"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nishon-ai-network

  redis:
    image: redis:7-alpine
    container_name: nishon-ai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - nishon-ai-network

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: nishon-ai-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://nishon:nishon_secret@postgres:5432/nishon_ai_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_DEVELOPER_TOKEN=${GOOGLE_DEVELOPER_TOKEN}
      - TIKTOK_APP_ID=${TIKTOK_APP_ID}
      - TIKTOK_APP_SECRET=${TIKTOK_APP_SECRET}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PORT=3001
      - NODE_ENV=${NODE_ENV:-development}
      - FRONTEND_URL=${FRONTEND_URL}
      - API_BASE_URL=${API_BASE_URL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nishon-ai-network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: nishon-ai-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NODE_ENV=${NODE_ENV:-development}
    depends_on:
      - api
    networks:
      - nishon-ai-network

volumes:
  postgres_data:
  redis_data:

networks:
  nishon-ai-network:
    driver: bridge
