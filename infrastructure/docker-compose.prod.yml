version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nishon_postgres_prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nishon_ai_db}
      POSTGRES_USER: ${POSTGRES_USER:-nishon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-nishon}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - nishon_network

  redis:
    image: redis:7-alpine
    container_name: nishon_redis_prod
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - nishon_network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: production
    container_name: nishon_api_prod
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - nishon_network

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
      target: production
    container_name: nishon_web_prod
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    restart: always
    networks:
      - nishon_network

  nginx:
    image: nginx:alpine
    container_name: nishon_nginx
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: always
    networks:
      - nishon_network

volumes:
  postgres_data:
  redis_data:

networks:
  nishon_network:
    driver: bridge
