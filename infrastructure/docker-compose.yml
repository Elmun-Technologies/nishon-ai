version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: performa_postgres
    environment:
      POSTGRES_DB: performa_ai_db
      POSTGRES_USER: performa
      POSTGRES_PASSWORD: performa_secret
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U performa -d performa_ai_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - performa_network

  redis:
    image: redis:7-alpine
    container_name: performa_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - performa_network

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: performa_api
    ports:
      - '3001:3001'
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - performa_network
    volumes:
      - ../apps/api:/app
      - /app/node_modules

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: performa_web
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      - api
    networks:
      - performa_network
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
  redis_data:

networks:
  performa_network:
    driver: bridge
