name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny GITHUB_TOKEN: jobs that need extra access opt in locally.
# This is the GitHub-recommended hardening — limits blast radius if any
# third-party action turns out to be compromised.
permissions:
  contents: read

jobs:
  api:
    name: API · test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @adspectr/shared build
          pnpm --filter @adspectr/ai-sdk build

      - name: Unit tests
        run: pnpm --filter api test

      - name: Build
        run: pnpm --filter api build

      # API source is lint-error-free. We deliberately use `lint:check` (no
      # --fix) so CI never silently rewrites prettier whitespace across
      # ~190 files; warnings are visible but don't fail the build.
      - name: Lint
        run: pnpm --filter api lint:check

  web:
    name: Web · lint + i18n + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: |
          pnpm --filter @adspectr/shared build
          pnpm --filter @adspectr/ai-sdk build

      - name: Lint
        run: pnpm --filter web lint

      - name: i18n key parity (uz/ru/en)
        run: pnpm --filter web i18n:check

      - name: Typecheck
        run: pnpm --filter web exec tsc --noEmit

      - name: Unit tests (vitest)
        run: pnpm --filter web test:unit

      - name: Build
        run: pnpm --filter web build

      # Smoke tests use Playwright's request API only (no browser download),
      # so they run on the build output started via `next start`.
      - name: Smoke tests (e2e)
        run: pnpm --filter web test:e2e
        env:
          CI: 'true'
