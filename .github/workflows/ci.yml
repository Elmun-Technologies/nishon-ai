name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default-deny GITHUB_TOKEN: jobs that need extra access opt in locally.
# This is the GitHub-recommended hardening — limits blast radius if any
# third-party action turns out to be compromised.
permissions:
  contents: read

jobs:
  api:
    name: API · test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Persist Turborepo's task cache so unchanged packages skip test/build/lint
      # on subsequent runs. Turbo hashes inputs itself; this only stores the dir.
      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-api-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-api-${{ runner.os }}-

      # `^build` builds @adspectr/shared + ai-sdk first; test/build/lint:check
      # are cached per-package, so no-op changes hit FULL TURBO.
      - name: Test + build + lint
        run: pnpm exec turbo run test build lint:check --filter=api

  web:
    name: Web · lint + i18n + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 8.15.5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-web-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-web-${{ runner.os }}-

      # Persist Next.js's compiler cache across runs (turbo deliberately excludes
      # .next/cache from its own outputs, so it must be cached at the CI layer).
      - name: Next.js build cache
        uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      # One turbo invocation runs the whole web gate with maximal parallelism:
      # lint/i18n/test:unit run immediately; typecheck + e2e wait on build (so
      # typecheck also validates Next's generated route types). Smoke tests use
      # Playwright's request API only (no browser download), started via `next
      # start`.
      - name: Lint + i18n + typecheck + test + build + e2e
        run: pnpm exec turbo run lint i18n:check test:unit typecheck build test:e2e --filter=web
        env:
          CI: 'true'
