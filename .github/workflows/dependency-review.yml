name: Dependency review

# Fails a PR that introduces a dependency with a known vulnerability,
# an incompatible license, or a downgrade. Runs only on PRs because it
# diffs base...head — there is nothing to compare on a push to main.
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write # write a summary comment with the diff

jobs:
  review:
    name: Review dependency diff
    runs-on: ubuntu-latest
    # Soft-fail until Dependency graph is enabled in repo settings:
    #   Settings -> Code security and analysis -> Dependency graph -> Enable
    # The feature is free for private repos as of 2023 but is off by default
    # on older orgs. Until it's enabled, this action fails with
    # "Dependency review is not supported on this repository". Marking the
    # job continue-on-error means the workflow itself stays green so merges
    # aren't blocked, but the failure is still visible in the Checks tab.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          # Block any new dep with a high or critical CVE.
          fail-on-severity: high
          comment-summary-in-pr: on-failure
